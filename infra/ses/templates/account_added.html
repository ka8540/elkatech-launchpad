<!doctype html>
<html lang="en">
  <body style="margin:0;padding:0;background:#f5f3ee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#181a1d;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f3ee;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border:1px solid #e8e3d6;border-radius:12px;padding:32px;">
            <tr>
              <td style="font-size:14px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#ac531c;padding-bottom:8px;">
                ElkaTech Service Portal
              </td>
            </tr>
            <tr>
              <td style="font-size:20px;font-weight:700;color:#181a1d;padding-bottom:16px;">
                Your account has been added
              </td>
            </tr>
            <tr>
              <td style="font-size:15px;line-height:1.55;color:#45484e;padding-bottom:16px;">
                Hello,<br /><br />
                An administrator has added your account to the ElkaTech Service Portal.
                Please sign in or sign up using this email address:
              </td>
            </tr>
            <tr>
              <td style="font-size:15px;font-weight:600;color:#181a1d;padding:12px 16px;background:#f3f0e8;border:1px solid #e8e3d6;border-radius:8px;">
                {{email}}
              </td>
            </tr>
            <tr>
              <td style="padding-top:24px;">
                <a href="{{portalUrl}}" style="display:inline-block;background:#ac531c;color:#ffffff;text-decoration:none;font-weight:600;padding:10px 18px;border-radius:8px;">
                  Open the portal
                </a>
              </td>
            </tr>
            <tr>
              <td style="font-size:12px;color:#6c6f76;padding-top:24px;border-top:1px solid #efeae0;margin-top:24px;">
                {{portalUrl}}<br /><br />
                Thank you,<br />
                ElkaTech Team
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
